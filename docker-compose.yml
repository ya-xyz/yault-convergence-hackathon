# Yallet Asset Management Platform — Test Environment
#
# Usage:
#   docker compose up              # start all services (API + ArLocal)
#   docker compose up api          # start API server only
#   docker compose down -v         # stop and remove volumes
#
# The API server serves the unified web app (client / authority / ops) at /
# and all /api/* endpoints. ArLocal provides a local Arweave instance for testing.

services:
  # ---------- API Server (serves webapp + API) ----------------------------------
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - CORS_ORIGIN=*
      - EMAIL_PROVIDER=console
      # Use local ArLocal for Arweave testing
      - ARWEAVE_GATEWAY=http://arlocal:1984
      # Authentication (generate with: openssl rand -hex 32)
      - JWT_SECRET=${JWT_SECRET:-}
      - CLIENT_SESSION_SECRET=${CLIENT_SESSION_SECRET:-}
      # drand (public beacon)
      - DRAND_CHAIN_HASH=${DRAND_CHAIN_HASH:-dbd506d6ef76e5f386f41c651dcb808c5bcbd75471cc4eafa3f4df7ad4e4c493}
      # Vault & Chain
      - VAULT_ADDRESS=${VAULT_ADDRESS:-}
      - EVM_RPC_URL=${EVM_RPC_URL:-https://ethereum-sepolia-rpc.publicnode.com}
      - VAULT_CHAIN_ID=${VAULT_CHAIN_ID:-11155111}
      - VAULT_UNDERLYING_DECIMALS=${VAULT_UNDERLYING_DECIMALS:-6}
      # Admin
      - ADMIN_WALLETS=${ADMIN_WALLETS:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      # Oracle
      - ORACLE_INTERNAL_API_KEY=${ORACLE_INTERNAL_API_KEY:-}
      - ORACLE_ATTESTATION_ENABLED=${ORACLE_ATTESTATION_ENABLED:-}
      - RELEASE_ATTESTATION_ADDRESS=${RELEASE_ATTESTATION_ADDRESS:-}
      # Arweave wallet
      - ARWEAVE_WALLET_JWK=${ARWEAVE_WALLET_JWK:-}
    depends_on:
      arlocal:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------- ArLocal (local Arweave for testing) ------------------------------
  arlocal:
    image: textury/arlocal:v1.1.1
    ports:
      - "1984:1984"
